name: ci

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

      - name: Run unit tests
        run: docker compose run --rm etl pytest

      - name: Upload GE artifacts (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ge-artifacts-unit-tests
          path: logs/
          if-no-files-found: ignore

  integration-smoke:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [ unit-tests ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create CI .env
        run: |
          cp .env.example .env
          sed -i 's/CHANGE_ME_USE_A_STRONG_PASSWORD/ci_strong_password_123!/' .env
          sed -i 's/CHANGE_ME_USE_A_RANDOM_TOKEN/ci_token_1234567890abcdef/' .env

      - name: Start services (Postgres only)
        run: docker compose up -d --build postgres

      - name: Run ETL smoke test
        run: docker compose run --rm etl

      - name: Upload GE artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ge-artifacts-integration
          path: logs/
          if-no-files-found: ignore

      - name: Shutdown
        if: always()
        run: docker compose down
